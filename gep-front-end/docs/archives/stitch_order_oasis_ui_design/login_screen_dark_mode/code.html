<body class="bg-inverse-surface min-h-screen flex items-center justify-center font-body-base text-body-base text-on-surface-variant">
<div class="w-full max-w-md p-container-padding">
<div class="bg-surface-variant rounded border border-outline shadow-[0px_4px_12px_rgba(0,0,0,0.5)] p-container-padding flex flex-col items-center">
<div class="mb-widget-gap flex flex-col items-center">
<div class="w-16 h-16 bg-primary-container rounded flex items-center justify-center mb-base">
<span class="material-symbols-outlined text-on-primary-container" style="font-size: 32px; font-variation-settings: 'FILL' 1;">local_shipping</span>
</div>
<h1 class="font-headline-md text-headline-md font-bold text-primary-fixed-dim">Order Oasis</h1>
<p class="font-body-sm text-body-sm text-outline-variant">SCM Platform</p>
</div>
<form class="w-full flex flex-col gap-widget-gap">
<div class="flex flex-col gap-base">
<label class="font-body-sm text-body-sm text-outline-variant" for="email">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant" style="font-size: 18px;">mail</span>
<input class="w-full bg-inverse-surface border border-outline rounded pl-10 pr-3 py-2 text-on-surface focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim transition-colors placeholder-outline-variant" id="email" placeholder="user@company.com" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-body-sm text-body-sm text-outline-variant" for="password">Password</label>
<a class="font-body-sm text-body-sm text-primary-fixed-dim hover:text-primary-fixed transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant" style="font-size: 18px;">lock</span>
<input class="w-full bg-inverse-surface border border-outline rounded pl-10 pr-3 py-2 text-on-surface focus:border-primary-fixed-dim focus:ring-1 focus:ring-primary-fixed-dim transition-colors placeholder-outline-variant" id="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center gap-2 mt-base">
<input class="bg-inverse-surface border-outline rounded text-primary-fixed-dim focus:ring-primary-fixed-dim focus:ring-offset-inverse-surface w-4 h-4 cursor-pointer" id="remember" type="checkbox"/>
<label class="font-body-sm text-body-sm text-outline-variant cursor-pointer" for="remember">Remember me for 30 days</label>
</div>
<button class="mt-base w-full bg-primary hover:bg-surface-tint text-on-primary font-title-sm text-title-sm py-2 px-4 rounded transition-colors shadow-sm" type="submit">
                    Sign In
                </button>
</form>
<div class="mt-container-padding pt-widget-gap border-t border-outline w-full text-center">
<p class="font-body-sm text-body-sm text-outline-variant">
                    Need system access? <a class="text-primary-fixed-dim hover:text-primary-fixed transition-colors" href="#">Contact IT Support</a>
</p>
</div>
</div>
